# SWE-agent config for TraceGen synthetic bugs
# Based on swe-agent/config/dashscope_qwen3.yaml (official benchmark config)
agent:
  model:
    per_instance_cost_limit: 0
    total_cost_limit: 0
    per_instance_call_limit: 150
    temperature: 0.0
    top_p: 1.0
    max_input_tokens: 0
    max_output_tokens: 0
  templates:
    system_template: |-
      You are a helpful assistant that can interact with a computer to solve tasks.
    instance_template: |-
      <uploaded_files>
      {{working_dir}}
      </uploaded_files>
      I've uploaded a python code repository in the directory {{working_dir}}. Consider the following issue description:

      <issue_description>
      {{problem_statement}}
      </issue_description>

      Can you help me implement the necessary changes to the repository so that the issue described above is resolved?
      I've already taken care of all changes to any of the test files. This means you DON'T have to modify the testing logic or any of the tests in any way!
      Your task is to make the minimal changes to non-test files in the {{working_dir}} directory to ensure the issue is resolved.
      Follow these steps:
      1. Find and read code relevant to the issue
      2. Create a script to reproduce the error and execute it to confirm the error
      3. Edit the source code to resolve the issue
      4. Rerun your reproduce script to confirm the fix
      5. Think about edge cases and make sure your fix handles them
      Your thinking should be thorough and so it's fine if it's very long.
    next_step_template: |-
      OBSERVATION:
      {{observation}}
    next_step_no_output_template: |-
      Your last command ran successfully and did not produce any output.
  tools:
    execution_timeout: 300
    env_variables:
      PAGER: cat
      MANPAGER: cat
      LESS: -R
      PIP_PROGRESS_BAR: 'off'
      TQDM_DISABLE: '1'
      GIT_PAGER: cat
    bundles:
      - path: tools/registry
      - path: tools/edit_anthropic
      - path: tools/review_on_submit_m
      - path: tools/diff_state
    enable_bash_tool: true
    parse_function:
      type: function_calling
    registry_variables:
      USE_FILEMAP: 'true'
      SUBMIT_REVIEW_MESSAGES:
        - |
          Thank you for your work on this issue. Please carefully follow the steps below to help review your changes.

          1. If you made any changes to your code after running the reproduction script, please run the reproduction script again.
            If the reproduction script is failing, please revisit your changes and make sure they are correct.
            If you have already removed your reproduction script, please ignore this step.
          2. Remove your reproduction script (if you haven't done so already).
          3. If you have modified any TEST files, please revert them to the state they had before you started fixing the issue.
            You can do this with `git checkout -- /path/to/test/file.py`. Use below <diff> to find the files you need to revert.
          4. Run the submit command again to confirm.

          Here is a list of all of your changes:

          <diff>
          {{diff}}
          </diff>
  history_processors: []
